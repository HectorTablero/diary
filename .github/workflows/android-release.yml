name: Android Release

on:
  push:
    branches: [ "main" ]
    paths:
      - "web/**"
      - "shared/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      # The root package.json version is the single source of truth (bumped by the pre-commit
      # hook). The tag, the APK versionName/versionCode and the OTA bundle name all derive from
      # it, so the app can never disagree with what was published.
      - name: Compute version
        id: version
        run: npm run version:info >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        working-directory: web/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > diary-release.keystore

      - name: Write keystore.properties
        working-directory: web/android/app
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=diary-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build web assets + sync Capacitor
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_CLIENT_SOURCE_TOKEN }}
          VITE_BETTERSTACK_INGEST_URL: ${{ vars.BETTERSTACK_CLIENT_INGEST_URL }}
        run: npm run build:app

      # web/dist is the app-mode build that `cap sync` just copied into the APK — the exact same
      # web layer, packaged for over-the-air delivery. index.html must sit at the zip root.
      - name: Package OTA bundle
        run: |
          mkdir -p dist
          cd web/dist
          zip -qr "../../dist/bundle-${{ steps.version.outputs.version }}-${{ steps.version.outputs.fingerprint }}.zip" .

      - name: Build signed release APK
        working-directory: web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PappVersionCode=${{ steps.version.outputs.code }} \
            -PappVersionName=${{ steps.version.outputs.version }}

      - name: Prepare release assets
        run: cp web/android/app/build/outputs/apk/release/app-release.apk dist/diary.apk

      # softprops/action-gh-release will create a tag but never *moves* an existing one, which is
      # why the old rolling `latest` release kept serving source zips from a stale commit while
      # its APK was rebuilt. Point the tag at this commit explicitly before publishing.
      - name: Move version tag to this commit
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Built from ${{ github.sha }}.

            - `diary.apk` — full install. Needed when the native shell changes.
            - `bundle-*.zip` — web layer, delivered over the air to installed apps
              (native shell `${{ steps.version.outputs.fingerprint }}`).
          prerelease: false
          make_latest: true
          files: |
            dist/diary.apk
            dist/bundle-*.zip
