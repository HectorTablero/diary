name: Android Release

on:
  push:
    branches: [ "main" ]
    paths:
      - "web/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Compute version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=${PKG_VERSION}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Restore signing keystore
        working-directory: web/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > diary-release.keystore

      - name: Write keystore.properties
        working-directory: web/android/app
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=diary-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build web assets + sync Capacitor
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_APP_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: npm run build:app

      - name: Build signed release APK
        working-directory: web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PappVersionCode=${{ steps.version.outputs.code }} \
            -PappVersionName=${{ steps.version.outputs.name }}

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp web/android/app/build/outputs/apk/release/app-release.apk dist/diary.apk

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (${{ steps.version.outputs.code }} / ${{ steps.version.outputs.name }})"
          body: |
            Automatically built from ${{ github.sha }} on ${{ github.event.repository.updated_at }}.
            This release is overwritten by every push to `main` — it always points at the newest APK.
          prerelease: false
          make_latest: true
          files: |
            dist/diary.apk
